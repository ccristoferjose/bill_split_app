<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Receipt shape (white) — zigzag top and bottom edges like Lucide's Receipt icon -->
  <path
    d="M 20 20
       v 60
       l 6,-3 6,3 6,-3 6,3 6,-3 6,3 6,-3 6,3
       V 20
       l -6,3 -6,-3 -6,3 -6,-3 -6,3 -6,-3 -6,3 -6,-3
       Z"
    fill="white"
  />

  <!-- Receipt lines (teal on white) -->
  <line x1="32" y1="38" x2="68" y2="38" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="68" y2="50" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="62" x2="54" y2="62" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
</svg>
