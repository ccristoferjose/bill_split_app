# ─────────────────────────────────────────────────────────────
#  BillSplit — docker-compose
#  All services read from backend/.env (single source of truth)
#  Production: docker compose up mysql backend -d
#  Local dev:  docker compose up -d  (includes frontend)
# ─────────────────────────────────────────────────────────────

services:

  # ── MySQL 8 ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: billsplit_mysql
    restart: unless-stopped
    env_file: ./backend/.env

    # Map DB_PASSWORD/DB_NAME from backend/.env to MySQL's expected vars
    entrypoint:
      - sh
      - -c
      - |
        export MYSQL_ROOT_PASSWORD="$$DB_PASSWORD"
        export MYSQL_DATABASE="$$DB_NAME"
        exec docker-entrypoint.sh mysqld

    ports:
      - "3306:3306"

    volumes:
      # Persistent data — survives container rebuilds
      - mysql_data:/var/lib/mysql
      # Auto-import schema on first boot (idempotent CREATE IF NOT EXISTS)
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

    networks:
      - backend_net

    healthcheck:
      test: ["CMD-SHELL", "mysql -u root -p$$DB_PASSWORD -e 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # ── Node.js / Express + Socket.IO ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: billsplit_backend
    restart: unless-stopped
    env_file: ./backend/.env

    # Bind only to localhost — Nginx on the host proxies inbound traffic
    ports:
      - "127.0.0.1:5001:5001"

    environment:
      NODE_ENV:  production
      PORT:      5001
      # Override DB_HOST to use Docker service name instead of localhost
      DB_HOST:   mysql
      DB_PORT:   3306

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - backend_net

    # Write logs to stdout — pick them up with: docker logs -f billsplit_backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── React Frontend (local dev only) ───────────────────────
  frontend:
    image: node:20-alpine
    container_name: billsplit_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    # Vite reads VITE_* vars from frontend/.env (mounted via volume)
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  frontend_node_modules:
    driver: local

# ─── Networks ─────────────────────────────────────────────────
networks:
  backend_net:
    driver: bridge
