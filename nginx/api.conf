# ─────────────────────────────────────────────────────────────
#  Nginx — api.yourdomain.com
#  Reverse proxy for Express + Socket.IO on Lightsail
#  Place at: /etc/nginx/sites-available/api.conf
#  Then: ln -s /etc/nginx/sites-available/api.conf /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────

# Upstream backend (bound to 127.0.0.1 by docker-compose)
upstream billsplit_backend {
    server 127.0.0.1:5001;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;

    # Let Certbot manage its own challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.yourdomain.com;

    # ── SSL (filled in by Certbot) ───────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/api.access.log;
    error_log  /var/log/nginx/api.error.log warn;

    # ── Socket.IO — MUST come before the /api block ──────────
    # Socket.IO uses /socket.io/ as its default path
    location /socket.io/ {
        proxy_pass         http://billsplit_backend;

        # WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Standard proxy headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep long-lived connections open for WebSocket
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 5s;
    }

    # ── REST API ──────────────────────────────────────────────
    location / {
        proxy_pass         http://billsplit_backend;

        proxy_http_version 1.1;
        proxy_set_header   Connection        "";   # disable keep-alive for HTTP/1.0 upstreams

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Body size limit (increase if file uploads added later)
        client_max_body_size 10m;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
    }
}
